name: Build and Push OutBreak Docker Image

on:
  push:
    branches: [ main, develop ]

jobs:
  build-outbreak:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          submodules-depth: 1

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./games/outBreak/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/outbreak:latest
            ghcr.io/${{ github.repository }}/outbreak:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}
          build-args: |
            BUILD_HASH=${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: false
